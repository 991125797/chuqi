<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBTI - 灵魂测试中...</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #fff;
            overflow-x: hidden;
        }

        /* 头部进度条 */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 100;
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 1.5rem;
        }

        .progress-container {
            max-width: 600px;
            margin: 0 auto;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .progress-text {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
        }

        .progress-percent {
            font-size: 1.2rem;
            font-weight: 700;
            color: #feca57;
        }

        .progress-bar {
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #feca57, #ff9f43);
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        /* 主内容区 */
        .main {
            padding: 100px 1.5rem 120px;
            max-width: 600px;
            margin: 0 auto;
            min-height: 100vh;
        }

        /* 题目容器 */
        .question-container {
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .question-number {
            font-size: 0.85rem;
            color: #feca57;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
        }

        .question-text {
            font-size: 1.4rem;
            font-weight: 700;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .question-emoji {
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        /* 选项 */
        .options {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .option {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 1.2rem 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .option:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateX(5px);
        }

        .option:active {
            transform: scale(0.98);
        }

        .option.selected {
            background: linear-gradient(135deg, rgba(254, 202, 87, 0.2), rgba(255, 159, 67, 0.2));
            border-color: #feca57;
        }

        .option-letter {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        .option.selected .option-letter {
            background: #feca57;
            color: #1a1a2e;
        }

        .option-text {
            font-size: 1rem;
            line-height: 1.5;
            color: rgba(255, 255, 255, 0.9);
        }

        /* 底部导航 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 1rem 1.5rem;
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-buttons {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            gap: 1rem;
        }

        .nav-btn {
            flex: 1;
            padding: 1rem;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .nav-btn.prev {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.7);
        }

        .nav-btn.prev:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .nav-btn.next {
            background: linear-gradient(135deg, #feca57, #ff9f43);
            color: #1a1a2e;
        }

        .nav-btn.next:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(254, 202, 87, 0.4);
        }

        .nav-btn.next:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .nav-btn.submit {
            background: linear-gradient(135deg, #26de81, #20bf6b);
            color: #fff;
        }

        .nav-btn.submit:hover {
            box-shadow: 0 5px 20px rgba(38, 222, 129, 0.4);
        }

        /* 完成动画 */
        .completion-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(26, 26, 46, 0.98);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 1000;
        }

        .completion-overlay.show {
            display: flex;
            animation: fadeIn 0.5s ease;
        }

        .completion-icon {
            font-size: 5rem;
            animation: bounce 1s ease infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .completion-text {
            font-size: 1.5rem;
            font-weight: 700;
            margin-top: 1.5rem;
            background: linear-gradient(135deg, #feca57, #ff9f43);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .completion-sub {
            color: rgba(255, 255, 255, 0.6);
            margin-top: 0.5rem;
        }

        /* 验证提示 */
        .verify-alert {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 107, 107, 0.95);
            padding: 2rem;
            border-radius: 20px;
            text-align: center;
            z-index: 1001;
            display: none;
        }

        .verify-alert.show {
            display: block;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translate(-50%, -50%) rotate(0); }
            25% { transform: translate(-50%, -50%) rotate(-3deg); }
            75% { transform: translate(-50%, -50%) rotate(3deg); }
        }

        .verify-alert h3 {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
        }

        .verify-alert p {
            font-size: 0.9rem;
            opacity: 0.9;
        }
    </style>
</head>

        // 状态管理
        let currentQuestion = 0;
        let answers = [];

        // 验证访问
        function checkVerification() {
            const verified = localStorage.getItem('sbti_verified');
            const verifyTime = localStorage.getItem('sbti_verify_time');
            
            // 检查验证是否在24小时内
            if (!verified || !verifyTime) {
                return false;
            }
            
            const elapsed = Date.now() - parseInt(verifyTime);
            const dayInMs = 24 * 60 * 60 * 1000;
            
            if (elapsed > dayInMs) {
                localStorage.removeItem('sbti_verified');
                localStorage.removeItem('sbti_verify_time');
                return false;
            }
            
            return true;
        }

        // 渲染题目
        function renderQuestion() {
            const container = document.getElementById('questionContainer');
            const q = questions[currentQuestion];
            
            container.innerHTML = `
                <div class="question-number">第 ${currentQuestion + 1} / ${questions.length} 题</div>
                <div class="question-emoji">${q.emoji}</div>
                <div class="question-text">${q.text}</div>
                <div class="options">
                    ${q.options.map((opt, idx) => `
                        <div class="option ${answers[currentQuestion] === idx ? 'selected' : ''}" data-index="${idx}">
                            <span class="option-letter">${opt.letter}</span>
                            <span class="option-text">${opt.text}</span>
                        </div>
                    `).join('')}
                </div>
            `;

            // 绑定选项点击事件
            document.querySelectorAll('.option').forEach(opt => {
                opt.addEventListener('click', () => selectOption(parseInt(opt.dataset.index)));
            });

            // 更新进度
            updateProgress();
            updateNavButtons();
        }

        // 选择选项
        function selectOption(index) {
            answers[currentQuestion] = index;
            renderQuestion();
        }

        // 更新进度条
        function updateProgress() {
            const answered = answers.filter(a => a !== undefined).length;
            const percent = Math.round((answered / questions.length) * 100);
            
            document.getElementById('progressPercent').textContent = `${percent}%`;
            document.getElementById('progressFill').style.width = `${percent}%`;
        }

        // 更新导航按钮
        function updateNavButtons() {
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            
            prevBtn.disabled = currentQuestion === 0;
            
            if (currentQuestion === questions.length - 1) {
                nextBtn.textContent = '查看结果 →';
                nextBtn.classList.add('submit');
            } else {
                nextBtn.textContent = '下一题 →';
                nextBtn.classList.remove('submit');
            }
        }

        // 下一题/提交
        function nextQuestion() {
            if (answers[currentQuestion] === undefined) {
                // 可以提示选择，但也可以让用户跳过
                return;
            }

            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                renderQuestion();
            } else {
                submitTest();
            }
        }

        // 上一题
        function prevQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                renderQuestion();
            }
        }

        // 提交测试
        function submitTest() {
            if (answers.filter(a => a !== undefined).length < questions.length) {
                alert('请回答所有题目');
                return;
            }

            // 显示完成动画
            document.getElementById('completionOverlay').classList.add('show');

            // 计算结果
            const result = calculateResult();
            
            // 存储结果
            localStorage.setItem('sbti_result', JSON.stringify(result));
            localStorage.setItem('sbti_answers', JSON.stringify(answers));

            // 延迟跳转
            setTimeout(() => {
                window.location.href = 'result.html';
            }, 2500);
        }

        // 计算人格结果
        function calculateResult() {
            // 统计各维度得分
            const scores = {
                chill: 0,
                social: 0,
                direct: 0,
                avoid: 0,
                proactive: 0,
                dramatic: 0,
                sensitive: 0,
                wise: 0,
                patient: 0,
                generous: 0,
                brave: 0,
                confident: 0,
                independent: 0,
                ambitious: 0,
                emotional: 0,
                helpful: 0,
                overthink: 0,
                positive: 0,
                acceptance: 0
            };

            answers.forEach((answerIdx, questionIdx) => {
                const question = questions[questionIdx];
                const selectedOption = question.options[answerIdx];
                Object.entries(selectedOption.score).forEach(([key, value]) => {
                    scores[key] = (scores[key] || 0) + value;
                });
            });

            // 根据得分确定人格
            let personality = 'MALO';

            // 核心判断逻辑
            if (scores.dramatic >= 12 && scores.emotional >= 8) {
                personality = 'DRAMA';
            } else if (scores.wise >= 10 && scores.confident >= 8) {
                personality = 'WISE';
            } else if (scores.direct >= 10 && scores.brave >= 8) {
                personality = 'Fxxker';
            } else if (scores.confident >= 10 && scores.social >= 8) {
                personality = 'Hottie';
            } else if (scores.independent >= 10 && scores.acceptance >= 8) {
                personality = 'GHOST';
            } else if (scores.overthink >= 10 && scores.sensitive >= 8) {
                personality = 'DEAD';
            } else if (scores.generous >= 10 && scores.helpful >= 8) {
                personality = 'ATM';
            } else if (scores.proactive >= 10 && scores.ambitious >= 8) {
                personality = 'CTRL';
            } else if (scores.confident >= 8 && scores.acceptance >= 6) {
                personality = 'MALO';
            } else {
                // 默认根据最高分项判断
                const maxScore = Math.max(...Object.values(scores));
                const maxKey = Object.entries(scores).find(([k, v]) => v === maxScore)?.[0];
                
                const mapping = {
                    chill: 'MALO',
                    avoid: 'GHOST',
                    social: 'Hottie',
                    dramatic: 'DRAMA',
                    wise: 'WISE',
                    direct: 'Fxxker',
                    sensitive: 'DEAD',
                    generous: 'ATM',
                    confident: 'CTRL'
                };
                
                personality = mapping[maxKey] || 'MALO';
            }

            return {
                type: personality,
                scores: scores,
                timestamp: Date.now()
            };
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            // 检查验证
            if (!checkVerification()) {
                document.getElementById('verifyAlert').classList.add('show');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
                return;
            }

            // 绑定导航事件
            document.getElementById('prevBtn').addEventListener('click', prevQuestion);
            document.getElementById('nextBtn').addEventListener('click', nextQuestion);

            // 键盘导航
            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'Enter') {
                    if (answers[currentQuestion] !== undefined) {
                        nextQuestion();
                    }
                } else if (e.key === 'ArrowLeft') {
                    prevQuestion();
                } else if (['1', '2', '3', '4'].includes(e.key)) {
                    const idx = parseInt(e.key) - 1;
                    if (questions[currentQuestion].options[idx]) {
                        selectOption(idx);
                    }
                }
            });

            // 渲染第一题
            renderQuestion();
        });
    </script>
