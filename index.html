            align-items: center;
            justify-content: center;

        .container { text-align: center; padding: 2rem; max-width: 500px; width: 90%; }
        .logo { font-size: 4rem; font-weight: 900; background: linear-gradient(135deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.5rem; }
        .subtitle { color: rgba(255,255,255,0.7); font-size: 1rem; margin-bottom: 2rem; letter-spacing: 4px; }
        .card { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border-radius: 24px; padding: 2.5rem; border: 1px solid rgba(255,255,255,0.1); }
        .card-title { color: #fff; font-size: 1.3rem; margin-bottom: 0.5rem; font-weight: 700; }
        .card-desc { color: rgba(255,255,255,0.5); font-size: 0.85rem; margin-bottom: 2rem; }
        .code-input { width: 100%; padding: 1.2rem 1.5rem; font-size: 1.4rem; font-family: 'Courier New', monospace; text-align: center; letter-spacing: 8px; background: rgba(255,255,255,0.08); border: 2px solid rgba(255,255,255,0.1); border-radius: 16px; color: #fff; outline: none; text-transform: uppercase; }

        .error-msg { color: #ff6b6b; font-size: 0.9rem; margin-top: 0.5rem; display: none; }
        .submit-btn { width: 100%; padding: 1rem 2rem; font-size: 1.1rem; font-weight: 700; color: #1a1a2e; background: linear-gradient(135deg, #feca57, #ff9f43); border: none; border-radius: 12px; cursor: pointer; margin-top: 1.5rem; }
        .footer-tip { margin-top: 1.5rem; color: rgba(255,255,255,0.4); font-size: 0.75rem; }
        .footer-tip span { color: #feca57; }
        /* 测试页样式 */
        .test-page { display: none; padding: 80px 1.5rem 120px; min-height: 100vh; }
        .header { position: fixed; top: 0; left: 0; width: 100%; z-index: 100; background: rgba(26,26,46,0.95); backdrop-filter: blur(10px); padding: 1rem 1.5rem; }
        .progress-container { max-width: 600px; margin: 0 auto; }
        .progress-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
        .progress-text { font-size: 0.9rem; color: rgba(255,255,255,0.7); }
        .progress-percent { font-size: 1.2rem; font-weight: 700; color: #feca57; }
        .progress-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #feca57, #ff9f43); border-radius: 3px; transition: width 0.5s ease; }
        .question-container { animation: fadeIn 0.5s ease; max-width: 600px; margin: 0 auto; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .question-number { font-size: 0.85rem; color: #feca57; margin-bottom: 1rem; }
        .question-text { font-size: 1.3rem; font-weight: 700; color: #fff; margin-bottom: 2rem; line-height: 1.6; }
        .options { display: flex; flex-direction: column; gap: 1rem; }
        .option { background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 1.2rem 1.5rem; cursor: pointer; transition: all 0.3s ease; text-align: left; color: #fff; font-size: 1rem; }
        .option:hover { background: rgba(255,255,255,0.1); border-color: rgba(254,202,87,0.5); transform: translateX(8px); }
        .option.selected { background: rgba(254,202,87,0.2); border-color: #feca57; }
        /* 结果页样式 */
        .result-page { display: none; padding: 2rem; text-align: center; }
        .result-emoji { font-size: 6rem; margin-bottom: 1rem; }
        .result-type { font-size: 2.5rem; font-weight: 900; background: linear-gradient(135deg, #ff6b6b, #feca57); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.5rem; }
        .result-tagline { color: rgba(255,255,255,0.6); font-size: 1.1rem; margin-bottom: 2rem; }
        .result-desc { background: rgba(255,255,255,0.05); border-radius: 16px; padding: 1.5rem; color: rgba(255,255,255,0.8); line-height: 1.8; margin-bottom: 2rem; text-align: left; }
        .result-tags { display: flex; flex-wrap: wrap; gap: 0.5rem; justify-content: center; margin-bottom: 2rem; }
        .tag { background: rgba(254,202,87,0.2); color: #feca57; padding: 0.5rem 1rem; border-radius: 20px; font-size: 0.85rem; }
        .restart-btn { padding: 1rem 2rem; font-size: 1rem; font-weight: 700; color: #1a1a2e; background: linear-gradient(135deg, #feca57, #ff9f43); border: none; border-radius: 12px; cursor: pointer; }

            { id: 'Fxxker', name: '草者', emoji: '🔥', tagline: '情绪说来就来，绝不憋着', desc: '你是一团行走的火焰，情绪来得快去得也快。开心的时候全世界都是好朋友，不爽的时候谁都别惹你。你不会压抑自己，有什么说什么。虽然有时候会得罪人，但至少你活得很真实。那些虚伪的社交表演，你一秒都演不下去。', tags: ['真性情', '情绪真实', '直来直去', '不会演戏', '爱恨分明'] },
            { id: 'CTRL', name: '拿捏者', emoji: '🎯', tagline: '人间清醒，格局打开', desc: '你是朋友眼中最稳的那个人，总能看清局势，做出最合理的选择。你不会被情绪左右，也不会冲动做决定。你的人生哲学是：能拿捏的事，绝不放任。你的冷静和理性让你在很多场合都能占据主动，但有时候也会让人觉得距离感有点强。', tags: ['人间清醒', '情绪稳定', '格局打开', '理性决策', '掌控全局'] },
            { id: 'POOR', name: '贫困者', emoji: '🪙', tagline: '钱包比脸还干净', desc: '恭喜你，你获得了最真实的人格类型！你的人生写照就是：钱没了，下个月再说。你可能在赚钱，但花钱的速度永远比赚钱快。不是你不努力，是这个世界诱惑太多。你的人生格言是：及时行乐，谁知道明天会发生什么？', tags: ['月光族', '钱包哭泣', '消费主义', '活在当下', '潇洒人生'] },
            { id: 'GHOST', name: '幽灵', emoji: '👻', tagline: '来无影去无踪，社交绝缘体', desc: '你是朋友圈里的隐藏玩家，存在感几乎为零，但大家又都知道你存在。你可能是群聊里的潜水冠军，可能是聚会里的角落选手。你不喜欢被关注，但又不想完全消失。你的社交策略是：能不说话就不说话，能不出现就不出现。', tags: ['社交隐身', '群聊潜水', '存在感低', '独处达人', '佛系社交'] },
            { id: 'DRAMA', name: '影帝', emoji: '🎭', tagline: '人生如戏，全靠演技', desc: '你是生活舞台上的主角，每天都上演着精彩的表演。你很擅长察言观色，在不同的场合扮演不同的角色。有人说你虚伪，但你知道这就是社交生存法则。你的演技已经炉火纯青，很多时候连自己都分不清哪个是真实的自己了。', tags: ['社交达人', '演技在线', '察言观色', '人设经营', '八面玲珑'] },
            { id: 'WISE', name: '大智若愚', emoji: '🦉', tagline: '看透不说透，还是好朋友', desc: '你是那个看透一切但选择沉默的人。你有很多想法，但不会轻易表达。你很清楚每个人在想什么，但你觉得揭穿没必要。你的智慧体现在：知道什么时候该说，什么时候不该说。你不是不聪明，是太聪明了，所以选择装傻。', tags: ['深藏不露', '看破不说', '智慧担当', '人狠话不多', '城府很深'] }
        ];

        // ============ 状态变量 ============
        let currentQuestion = 0;
        let answers = [];

        // ============ DOM元素 ============
        const loginPage = document.getElementById('loginPage');
        const testPage = document.getElementById('testPage');
        const resultPage = document.getElementById('resultPage');
        const codeInput = document.getElementById('codeInput');
        const submitBtn = document.getElementById('submitBtn');
        const errorMsg = document.getElementById('errorMsg');
        const questionContainer = document.getElementById('questionContainer');

        // ============ 验证码验证 ============
        function getUsedCodes() {
            return JSON.parse(localStorage.getItem('sbti_used_codes') || '[]');
        }

        function markCodeUsed(code) {
            let used = getUsedCodes();
            used.push(code);
            localStorage.setItem('sbti_used_codes', JSON.stringify(used));
        }

        function validateCode(code) {
            const usedCodes = getUsedCodes();
            const c = code.toUpperCase().trim();
            if (usedCodes.includes(c)) return { valid: false, error: '该验证码已使用过' };
            if (VALID_CODES.includes(c)) return { valid: true };
            return { valid: false, error: '验证码错误，请重试' };
        }

        // ============ 页面切换 ============
        function showTestPage() {
            loginPage.style.display = 'none';
            testPage.style.display = 'block';
            resultPage.style.display = 'none';
            renderQuestion();
        }

        function showResultPage(personality) {
            loginPage.style.display = 'none';
            testPage.style.display = 'none';
            resultPage.style.display = 'block';
            
            document.getElementById('resultEmoji').textContent = personality.emoji;
            document.getElementById('resultType').textContent = personality.name;
            document.getElementById('resultTagline').textContent = personality.tagline;
            document.getElementById('resultDesc').textContent = personality.desc;
            
            const tagsContainer = document.getElementById('resultTags');
            tagsContainer.innerHTML = personality.tags.map(t => `<span class="tag">${t}</span>`).join('');
        }

        // ============ 题目渲染 ============
        function renderQuestion() {
            const q = questions[currentQuestion];
            const progress = ((currentQuestion + 1) / questions.length * 100).toFixed(0);
            
            document.getElementById('currentQ').textContent = currentQuestion + 1;
            document.getElementById('progressPercent').textContent = progress + '%';
            document.getElementById('progressFill').style.width = progress + '%';

            questionContainer.innerHTML = `
                <div class="question-number">第 ${currentQuestion + 1} 题 / 共 ${questions.length} 题</div>
                <div class="question-text">${q.q}</div>
                <div class="options">
                    ${q.options.map((opt, i) => `<div class="option" data-index="${i}">${opt}</div>`).join('')}
                </div>
            `;

            document.querySelectorAll('.option').forEach(el => {
                el.addEventListener('click', () => selectOption(parseInt(el.dataset.index)));
            });
        }

        function selectOption(index) {
            answers[currentQuestion] = index;
            document.querySelectorAll('.option').forEach((el, i) => {
                el.classList.toggle('selected', i === index);
            });
            
            setTimeout(() => {
                if (currentQuestion < questions.length - 1) {
                    currentQuestion++;
                    renderQuestion();
                } else {
                    calculateResult();
                }
            }, 300);
        }

        // ============ 计算结果 ============
        function calculateResult() {
            // 简单的权重计算
            const scores = {};
            personalities.forEach(p => scores[p.id] = 0);
            
            // 根据答案计算分数
            answers.forEach((ans, qIdx) => {
                if (qIdx < 5 && ans === 0) scores['MALO'] += 2;
                if (qIdx < 5 && ans === 3) scores['DEAD'] += 2;
                if (qIdx >= 5 && qIdx < 10 && ans === 2) scores['ATM'] += 2;
                if (qIdx >= 5 && qIdx < 10 && ans === 1) scores['Hottie'] += 1;
                if (qIdx >= 10 && qIdx < 15 && ans === 0) scores['Fxxker'] += 2;
                if (qIdx >= 10 && qIdx < 15 && ans === 2) scores['CTRL'] += 2;
                if (qIdx >= 15 && ans === 1) scores['POOR'] += 2;
                if (qIdx >= 15 && ans === 0) scores['GHOST'] += 1;
            });
            
            // 随机加一些分数，让结果更有趣
            personalities.forEach(p => scores[p.id] += Math.random() * 3);
            
            // 找出最高分
            let maxScore = 0;
            let result = personalities[0];
            for (const p of personalities) {
                if (scores[p.id] > maxScore) {
                    maxScore = scores[p.id];
                    result = p;
                }
            }
            
            showResultPage(result);
        }

        // ============ 事件绑定 ============
        codeInput.addEventListener('input', (e) => {
            e.target.value = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
            errorMsg.style.display = 'none';
        });

        submitBtn.addEventListener('click', () => {
            const code = codeInput.value.trim();
            if (code.length !== 6) {
                errorMsg.textContent = '请输入6位验证码';
                errorMsg.style.display = 'block';
                return;
            }
            
            const result = validateCode(code);
            if (!result.valid) {
                errorMsg.textContent = result.error;
                errorMsg.style.display = 'block';
                return;
            }
            
            markCodeUsed(code);
            localStorage.setItem('sbti_verified', 'true');
            localStorage.setItem('sbti_verify_time', Date.now().toString());
            showTestPage();
        });

        codeInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') submitBtn.click();
        });

        document.getElementById('restartBtn').addEventListener('click', () => {
            currentQuestion = 0;
            answers = [];
            codeInput.value = '';
            localStorage.removeItem('sbti_verified');
            localStorage.removeItem('sbti_verify_time');
            loginPage.style.display = 'flex';
            testPage.style.display = 'none';
            resultPage.style.display = 'none';
        });

        // 检查是否已验证
        const verified = localStorage.getItem('sbti_verified');
        const verifyTime = localStorage.getItem('sbti_verify_time');
        if (verified && verifyTime && (Date.now() - parseInt(verifyTime) < 24 * 60 * 60 * 1000)) {
            showTestPage();
        }
    </script>
</body>
</html>
