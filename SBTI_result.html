<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBTI - 你的灵魂人格</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #fff;
            overflow-x: hidden;
        }

        /* 背景粒子效果 */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: float 15s infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* 主容器 */
        .container {
            position: relative;
            z-index: 1;
            max-width: 500px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
            min-height: 100vh;
        }

        /* 头部标题 */
        .header {
            text-align: center;
            margin-bottom: 2rem;
            animation: fadeInDown 0.8s ease;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header-label {
            display: inline-block;
            padding: 0.5rem 1.5rem;
            background: linear-gradient(135deg, rgba(254, 202, 87, 0.2), rgba(255, 159, 67, 0.2));
            border: 1px solid rgba(254, 202, 87, 0.3);
            border-radius: 50px;
            font-size: 0.85rem;
            color: #feca57;
            letter-spacing: 2px;
            margin-bottom: 1rem;
        }

        .header-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.9);
        }

        /* 结果卡片 */
        .result-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 2.5rem 2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            margin-bottom: 1.5rem;
            animation: fadeInUp 0.8s ease 0.2s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-emoji {
            font-size: 5rem;
            margin-bottom: 1rem;
            animation: bounce 2s ease infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .result-type {
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 0.5rem;
            letter-spacing: -2px;
        }

        .result-enName {
            font-size: 1.2rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }

        .result-tagline {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.8);
            padding: 0.8rem 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            display: inline-block;
        }

        /* 详细解读 */
        .description-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
            margin-bottom: 1.5rem;
            animation: fadeInUp 0.8s ease 0.4s both;
        }

        .description-title {
            font-size: 1rem;
            color: #feca57;
            margin-bottom: 1rem;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .description-text {
            font-size: 0.95rem;
            line-height: 1.8;
            color: rgba(255, 255, 255, 0.75);
            text-align: justify;
        }

        /* 特征标签 */
        .traits-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
            margin-bottom: 1.5rem;
            animation: fadeInUp 0.8s ease 0.5s both;
        }

        .traits-title {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 1rem;
            letter-spacing: 1px;
        }

        .traits-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .trait-tag {
            padding: 0.5rem 1rem;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.8);
        }

        /* 分享提示 */
        .share-card {
            background: linear-gradient(135deg, rgba(254, 202, 87, 0.1), rgba(255, 159, 67, 0.1));
            border-radius: 20px;
            padding: 1.5rem;
            border: 1px solid rgba(254, 202, 87, 0.2);
            text-align: center;
            margin-bottom: 1.5rem;
            animation: fadeInUp 0.8s ease 0.6s both;
        }

        .share-title {
            font-size: 1rem;
            color: #feca57;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        .share-desc {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
        }

        /* 操作按钮 */
        .actions {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            animation: fadeInUp 0.8s ease 0.7s both;
        }

        .action-btn {
            width: 100%;
            padding: 1rem 2rem;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Noto Sans SC', sans-serif;
        }

        .action-btn.primary {
            background: linear-gradient(135deg, #feca57, #ff9f43);
            color: #1a1a2e;
        }

        .action-btn.primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(254, 202, 87, 0.4);
        }

        .action-btn.secondary {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .action-btn.secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        /* 底部水印 */
        .watermark {
            text-align: center;
            margin-top: 2rem;
            padding-bottom: 2rem;
            animation: fadeIn 0.8s ease 1s both;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .watermark-text {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 2px;
        }

        .watermark-logo {
            color: #feca57;
            font-weight: 700;
        }

        /* 其他类型推荐 */
        .more-results {
            margin-top: 2rem;
            animation: fadeInUp 0.8s ease 0.8s both;
        }

        .more-title {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
            margin-bottom: 1rem;
            letter-spacing: 1px;
        }

        .more-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
        }

        .more-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 1rem;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
        }

        .more-item:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .more-emoji {
            font-size: 1.5rem;
            margin-bottom: 0.3rem;
        }

        .more-name {
            font-size: 0.85rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.9);
        }

        .more-tag {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.5);
        }

        /* Toast 提示 */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(0, 0, 0, 0.9);
            color: #fff;
            padding: 1rem 2rem;
            border-radius: 50px;
            font-size: 0.9rem;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* 分享图片预览 */
        .share-preview {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1001;
            flex-direction: column;
            padding: 1rem;
        }

        .share-preview.show {
            display: flex;
        }

        .share-preview img {
            max-width: 100%;
            max-height: 70vh;
            border-radius: 16px;
        }

        .share-preview-actions {
            margin-top: 1rem;
            display: flex;
            gap: 1rem;
        }

        .share-preview-btn {
            padding: 0.8rem 2rem;
            border: none;
            border-radius: 10px;
            font-size: 0.9rem;
            cursor: pointer;
            font-family: 'Noto Sans SC', sans-serif;
        }

        .share-preview-btn.save {
            background: #feca57;
            color: #1a1a2e;
        }

        .share-preview-btn.close {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
        }
    </style>
</head>

                emoji: "🦉",
                tagline: "看透不说透，还是好朋友",
                desc: "你是那个一眼就能看穿别人小心思的'老狐狸'。不是因为你城府深，是因为你真的见太多套路了。你选择'看透不说透'，不是虚伪，是懒得计较。你深谙'难得糊涂'的人生哲学，知道有些事认真就输了。你不轻易站队，不随便表态，但在关键时刻总能一针见血。你是那个朋友遇到情感困惑第一个想倾诉的人，因为你不仅能听，还能给出'人间清醒'的分析。",
                traits: ["洞察力强", "看透不说透", "大智若愚", "稳重可靠", "人生导师"],
                color: "#6c5ce7"
            }
        };

        // 获取URL参数
        function getQueryParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        // 显示Toast
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        // 渲染结果
        function renderResult() {
            // 从localStorage获取结果
            const resultData = localStorage.getItem('sbti_result');
            
            if (!resultData) {
                // 没有结果，跳转回首页
                window.location.href = 'index.html';
                return;
            }

            const result = JSON.parse(resultData);
            const personality = personalities[result.type];

            // 设置颜色
            document.documentElement.style.setProperty('--result-color', personality.color);
            
            // 更新结果卡片
            document.getElementById('resultEmoji').textContent = personality.emoji;
            document.getElementById('resultType').textContent = personality.name;
            document.getElementById('resultType').style.color = personality.color;
            document.getElementById('resultEnName').textContent = personality.enName;
            document.getElementById('resultTagline').textContent = personality.tagline;
            document.getElementById('resultDesc').textContent = personality.desc;

            // 渲染特征标签
            const traitsList = document.getElementById('traitsList');
            traitsList.innerHTML = personality.traits.map(trait => 
                `<span class="trait-tag">${trait}</span>`
            ).join('');

            // 渲染其他类型
            const otherTypes = Object.keys(personalities)
                .filter(type => type !== result.type)
                .sort(() => Math.random() - 0.5)
                .slice(0, 4);

            const moreList = document.getElementById('moreList');
            moreList.innerHTML = otherTypes.map(type => {
                const p = personalities[type];
                return `
                    <div class="more-item">
                        <div class="more-emoji">${p.emoji}</div>
                        <div class="more-name">${p.name}</div>
                        <div class="more-tag">${p.tagline}</div>
                    </div>
                `;
            }).join('');
        }

        // 创建背景粒子
        function createParticles() {
            const container = document.getElementById('particles');
            const particleCount = 20;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
                particle.style.animationDelay = Math.random() * 10 + 's';
                particle.style.width = (Math.random() * 4 + 2) + 'px';
                particle.style.height = particle.style.width;
                container.appendChild(particle);
            }
        }

        // 分享功能
        function shareResult() {
            const text = `我在SBTI测出的人格是"${document.getElementById('resultType').textContent}"！\n\n${document.getElementById('resultTagline').textContent}\n\n快去测测你的灵魂人格吧！🔗 ${window.location.origin}/SBTI/`;
            
            // 尝试使用Web Share API
            if (navigator.share) {
                navigator.share({
                    title: 'SBTI 灵魂人格测试',
                    text: text,
                    url: window.location.href
                }).catch(() => {
                    // 降级到复制链接
                    copyToClipboard();
                });
            } else {
                // 降级到复制链接
                copyToClipboard();
            }
        }

        // 复制到剪贴板
        function copyToClipboard() {
            const text = `我在SBTI测出的人格是"${document.getElementById('resultType').textContent}"！\n\n${document.getElementById('resultTagline').textContent}\n\n快去测测你的灵魂人格吧！🔗 ${window.location.href}`;
            
            navigator.clipboard.writeText(text).then(() => {
                showToast('链接已复制，快去分享给好友！');
            }).catch(() => {
                showToast('复制失败，请手动复制');
            });
        }

        // 重新测试
        function reTest() {
            localStorage.removeItem('sbti_result');
            localStorage.removeItem('sbti_answers');
            window.location.href = 'test.html';
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            createParticles();
            renderResult();

            // 绑定事件
            document.getElementById('shareBtn').addEventListener('click', shareResult);
            document.getElementById('reTestBtn').addEventListener('click', reTest);
        });
    </script>
</body>
</html>
